name: Cron Tests

on:
  schedule:
    - cron: "0 4 */4 * *" # at 04:00 UTC every 4th day
  workflow_dispatch:

jobs:
  test:
    env:
      CI_LOG_MODE: quiet
      CI_LOG_TAIL_LINES: 200
      GRAPH_QUERY_KEY: ${{ secrets.GRAPH_QUERY_KEY }}
    runs-on: ubuntu-latest
    steps:
      - name: Set up devkit
        uses: sablier-labs/devkit/actions/setup@v1

      - name: Generate the indexer bindings
        run: just ci-run codegen

      - name: Check the code
        run: just ci-run full-check

      - name: Run the tests
        id: tests
        continue-on-error: true
        env:
          TEST_VENDORS: true
        run: just ci-run test

      - name: Generate test summary
        if: always()
        run: bun run ./tests/summarize-test-failures.ts >> $GITHUB_STEP_SUMMARY
