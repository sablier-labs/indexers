name: CI

concurrency:
  cancel-in-progress: true
  group: ${{github.workflow}}-${{github.ref}}

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    env:
      CI_LOG_MODE: quiet
      CI_LOG_TAIL_LINES: 200
      ENVIO_ENVIRONMENT: development
      ENVIO_ROUTEMESH_API_KEY: ${{ secrets.ENVIO_ROUTEMESH_API_KEY }}
    runs-on: ubuntu-latest
    steps:
      - name: Set up devkit
        uses: sablier-labs/devkit/actions/setup@v1
        with:
          save-cache: true

      - name: Codegen Envio indexers
        run: just ci-run codegen::envio

      - name: Build all Graph indexers as a check
        run: just ci-run graph::build

      - name: Export the schemas
        run: just ci-run export-schema

      - name: Verify GraphQL schemas haven't changed
        run: | # shell
          bash .github/scripts/verify-no-diff.sh \
            "❌ GraphQL schemas are out of sync. Run 'just export-schema' locally and commit the changes." \
            "GraphQL schema diff" \
            src/schemas/airdrops.graphql \
            src/schemas/streams.graphql

      - name: Run the code checks
        run: |
          just ci-run full-check
          just ci-run prices-check

      - name: Run the tests
        run: just ci-run test

      - name: Add summary
        run: | # shell
          echo "## CI result" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMARY
